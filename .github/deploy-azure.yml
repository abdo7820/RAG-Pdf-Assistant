# ─────────────────────────────────────────────────────────────────────────────
# RAG Knowledge Base API — Azure App Service Deployment (no Docker)
#
# Strategy: Deploy the Python source directly to Azure App Service
#           (Linux, Python runtime), which builds and runs it with gunicorn.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   AZURE_CREDENTIALS        – JSON output of:
#                              az ad sp create-for-rbac --name "rag-api-sp"
#                                --role contributor
#                                --scopes /subscriptions/<SUB_ID>/resourceGroups/<RG>
#                                --sdk-auth
#
#   AZURE_WEBAPP_NAME        – Your App Service name (e.g. rag-knowledge-base-api)
#   AZURE_RESOURCE_GROUP     – Resource group containing the App Service
#
#   GROQ_API_KEY             – Passed as an App Setting to the running app
#
# Note: App Service must be created with a Python 3.11 Linux runtime, e.g.:
#   az webapp create --name <name> --resource-group <rg> --plan <plan> \
#     --runtime "PYTHON:3.11"
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Skip the local-inference stack (torch/transformers/accelerate) by
          # default to keep the deployed app lightweight — remove this grep
          # step if you need local Qwen inference running on App Service.
          grep -viE '^(torch|transformers|accelerate)==' requirements.txt > requirements.deploy.txt
          pip install -r requirements.deploy.txt --target=".python_packages/lib/site-packages"
          pip install gunicorn==26.0.0 --target=".python_packages/lib/site-packages"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set App Settings (env vars)
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
              GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              MODEL_PROVIDER=groq \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP }}
          startup-command: 'gunicorn --bind=0.0.0.0:8000 --timeout 600 --workers 2 app:app'
